<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>출동! 숲속 탐험대 준이와 함께하는 퀴즈</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
    background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 50%, #ffd3b6 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 720px;
    background: #fffef7;
    border-radius: 28px;
    padding: 32px 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    border: 6px solid #ffd966;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .title {
    font-size: 30px;
    font-weight: 900;
    color: #2e7d32;
    margin: 0 0 6px 0;
    line-height: 1.3;
  }
  .subtitle {
    font-size: 18px;
    color: #558b2f;
    margin: 0;
  }
  .progress-bar {
    height: 18px;
    background: #e8f5e9;
    border-radius: 999px;
    overflow: hidden;
    margin: 18px 0 12px 0;
    border: 2px solid #c5e1a5;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #66bb6a, #43a047);
    transition: width 0.4s ease;
  }
  .progress-text {
    text-align: center;
    font-size: 16px;
    color: #558b2f;
    font-weight: 700;
    margin-bottom: 18px;
  }
  .question-card {
    background: #fff9e6;
    border: 4px dashed #ffb74d;
    border-radius: 22px;
    padding: 26px 22px;
    margin-bottom: 22px;
    text-align: center;
  }
  .question-emoji {
    font-size: 56px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 22px;
    font-weight: 800;
    color: #3e2723;
    line-height: 1.5;
    margin: 0;
  }
  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .btn {
    flex: 1;
    font-size: 26px;
    font-weight: 900;
    padding: 20px 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
    color: white;
  }
  .btn:hover:not(:disabled) { transform: translateY(-3px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-yes {
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    box-shadow: 0 6px 0 #1565c0;
  }
  .btn-no {
    background: linear-gradient(135deg, #ef5350, #e53935);
    box-shadow: 0 6px 0 #c62828;
  }
  .feedback {
    margin-top: 22px;
    padding: 22px;
    border-radius: 20px;
    font-size: 18px;
    line-height: 1.6;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .feedback.correct {
    background: #e8f5e9;
    border: 4px solid #66bb6a;
    color: #1b5e20;
  }
  .feedback.wrong {
    background: #ffebee;
    border: 4px solid #ef5350;
    color: #b71c1c;
  }
  .feedback-title {
    font-size: 24px;
    font-weight: 900;
    margin: 0 0 8px 0;
  }
  .feedback-body {
    font-size: 19px;
    font-weight: 600;
    margin: 0;
  }
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 18px;
    font-size: 22px;
    font-weight: 900;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, #ffb74d, #ff9800);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #e65100;
    font-family: inherit;
    transition: transform 0.15s;
  }
  .next-btn:hover { transform: translateY(-3px); }
  .next-btn:active { transform: translateY(0); }

  /* 임명장 */
  .certificate {
    text-align: center;
    padding: 10px;
  }
  .cert-box {
    border: 8px double #d4a017;
    border-radius: 20px;
    padding: 30px 20px;
    background: linear-gradient(135deg, #fffde7, #fff8e1);
    position: relative;
  }
  .cert-medal { font-size: 80px; }
  .cert-title {
    font-size: 34px;
    font-weight: 900;
    color: #bf360c;
    margin: 10px 0 18px 0;
    letter-spacing: 2px;
  }
  .cert-body {
    font-size: 19px;
    color: #3e2723;
    line-height: 1.7;
    font-weight: 600;
    margin: 10px 0;
  }
  .cert-score {
    display: inline-block;
    margin: 16px 0;
    padding: 14px 28px;
    background: #fff176;
    border: 3px solid #f9a825;
    border-radius: 999px;
    font-size: 28px;
    font-weight: 900;
    color: #e65100;
  }
  .cert-comment {
    font-size: 20px;
    font-weight: 800;
    color: #2e7d32;
    margin-top: 10px;
  }
  .restart-btn {
    margin-top: 22px;
    padding: 16px 36px;
    font-size: 20px;
    font-weight: 900;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #66bb6a, #388e3c);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 0 #1b5e20;
    font-family: inherit;
  }
  .restart-btn:hover { transform: translateY(-2px); }

  @media (max-width: 480px) {
    .title { font-size: 24px; }
    .question-text { font-size: 19px; }
    .btn { font-size: 22px; padding: 16px 8px; }
    .cert-title { font-size: 26px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ====== 퀴즈 데이터 (이 배열만 수정하면 문제를 바꿀 수 있어요!) ======
const QUIZ_DATA = [
  {
    emoji: "🧥",
    question: "밖에서 놀 때 긴팔과 긴바지를 입으면 병원체 괴물을 막을 수 있다.",
    answer: "예",
    explanation: "긴 옷은 우리 피부를 지켜주는 튼튼한 갑옷 역할을 해요!"
  },
  {
    emoji: "🧺",
    question: "풀밭에 앉을 때 돗자리를 깔면 진드기를 피할 수 있다.",
    answer: "예",
    explanation: "돗자리는 우리와 병원체 사이를 갈라놓는 마법의 방패예요!"
  },
  {
    emoji: "👕",
    question: "집으로 돌아오면 옷은 그냥 두고 내 몸만 씻으면 된다.",
    answer: "아니오",
    explanation: "옷에 묻어온 병원체가 있을 수 있으니 옷도 꼭 빨아야 해요!"
  },
  {
    emoji: "🛁",
    question: "밖에서 놀고 돌아오면 손, 발, 머리까지 깨끗이 씻어야 한다.",
    answer: "예",
    explanation: "머리카락 사이, 발가락 사이에도 병원체가 숨을 수 있으니 구석구석 씻어야 해요!"
  },
  {
    emoji: "🐜",
    question: "풀밭에는 진드기나 쥐의 배설물 같은 위험한 것이 숨어 있을 수 있다.",
    answer: "예",
    explanation: "맞아요! 눈에는 안 보여도 풀 속에는 작은 생물들이 살고 있어요. 그래서 돗자리가 꼭 필요해요!"
  },
  {
    emoji: "🧼",
    question: "비누 거품으로 씻지 않고 물로만 씻어도 병원체가 다 사라진다.",
    answer: "아니오",
    explanation: "물만으로는 부족해요. 비누 거품이 있어야 병원체 괴물들이 미끄러져 도망가요!"
  },
  {
    emoji: "🌳",
    question: "긴 옷 입기, 돗자리 깔기, 돌아와서 씻기! 이 세 가지 약속을 지키면 멋진 탐험대장이 된다.",
    answer: "예",
    explanation: "딩동댕! 세 가지 약속을 잘 지키면 병원체와의 싸움에서 이기는 튼튼한 탐험대장이 돼요!"
  }
];
// =============================================================

function App() {
  const [current, setCurrent] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null); // '예' or '아니오' or null
  const [finished, setFinished] = useState(false);

  const q = QUIZ_DATA[current];
  const total = QUIZ_DATA.length;

  const handleAnswer = (choice) => {
    if (selected !== null) return;
    setSelected(choice);
    if (choice === q.answer) {
      setScore(score + 1);
    }
  };

  const handleNext = () => {
    if (current + 1 >= total) {
      setFinished(true);
    } else {
      setCurrent(current + 1);
      setSelected(null);
    }
  };

  const handleRestart = () => {
    setCurrent(0);
    setScore(0);
    setSelected(null);
    setFinished(false);
  };

  // 마무리 화면
  if (finished) {
    let comment = "";
    const rate = score / total;
    if (rate === 1) comment = "완벽해요! 최고의 탐험대장이에요! 🌟";
    else if (rate >= 0.7) comment = "아주 훌륭해요! 믿음직한 탐험대장이에요! 👍";
    else if (rate >= 0.4) comment = "잘했어요! 조금만 더 연습하면 완벽해요! 💪";
    else comment = "괜찮아요! 다시 도전해볼까요? 🌱";

    return (
      <div className="app">
        <div className="certificate">
          <div className="cert-box">
            <div className="cert-medal">🏅</div>
            <h1 className="cert-title">멋진 탐험대장 임명장</h1>
            <p className="cert-body">
              위 어린이는 감염병 예방 퀴즈를 통해<br/>
              <b>긴 옷 입기, 돗자리 깔기, 돌아와서 씻기</b><br/>
              세 가지 약속을 훌륭히 배웠기에<br/>
              <b>숲속 탐험대장</b>으로 임명합니다!
            </p>
            <div className="cert-score">
              점수 : {score} / {total} 점
            </div>
            <p className="cert-comment">{comment}</p>
            <p className="cert-body" style={{fontSize: "16px", marginTop: "18px"}}>
              🌳 숲속 탐험대 · 준이와 친구들 🌳
            </p>
          </div>
          <button className="restart-btn" onClick={handleRestart}>
            🔄 다시 도전하기
          </button>
        </div>
      </div>
    );
  }

  // 퀴즈 화면
  const isCorrect = selected === q.answer;
  const progress = ((current) / total) * 100;

  return (
    <div className="app">
      <div className="header">
        <h1 className="title">🌳 출동! 숲속 탐험대 🌳</h1>
        <p className="subtitle">준이와 함께하는 감염병 예방 퀴즈</p>
      </div>

      <div className="progress-bar">
        <div className="progress-fill" style={{width: `${progress}%`}}></div>
      </div>
      <div className="progress-text">
        {current + 1} / {total} 번째 문제
      </div>

      <div className="question-card">
        <div className="question-emoji">{q.emoji}</div>
        <p className="question-text">{q.question}</p>
      </div>

      <div className="btn-row">
        <button
          className="btn btn-yes"
          onClick={() => handleAnswer("예")}
          disabled={selected !== null}
        >
          ⭕ 예
        </button>
        <button
          className="btn btn-no"
          onClick={() => handleAnswer("아니오")}
          disabled={selected !== null}
        >
          ❌ 아니오
        </button>
      </div>

      {selected !== null && (
        <>
          <div className={`feedback ${isCorrect ? "correct" : "wrong"}`}>
            <p className="feedback-title">
              {isCorrect ? "🎉 정답이에요!" : `😅 아쉬워요! 정답은 [${q.answer}]예요.`}
            </p>
            <p className="feedback-body">💡 {q.explanation}</p>
          </div>
          <button className="next-btn" onClick={handleNext}>
            {current + 1 >= total ? "🏅 결과 보기" : "다음 문제로 ➡️"}
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
